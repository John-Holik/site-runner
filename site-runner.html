/* ---- small utils ---- */
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const rand = (a,b)=>a+Math.random()*(b-a);
const irand = (a,b)=>Math.floor(rand(a,b+1));
const pick = a=>a[(Math.random()*a.length)|0];
const fmt = n=>Math.round(n).toLocaleString('en-US');
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]];} return a; }
function qKey(q){ const s=(q.question||'').toLowerCase().replace(/\s+/g,' ').trim(); let h=5381; for(let i=0;i<s.length;i++) h=((h*33)^s.charCodeAt(i))>>>0; return h.toString(36); }

};

/* ---- question mastery (Quizlet-style, persisted; survives bank re-uploads) ---- */
function recordAnswer(q, correct){
  const k = qKey(q);
  const M = Profile.data.mastery;
  const m = M[k] || (M[k] = {s:0, need:2, m:false, a:0, c:0});
  m.a++;
  let newlyMastered = false;
  if (correct){
    m.c++; m.s++;
    if (!m.m && m.s >= m.need){ m.m = true; newlyMastered = true; }
  } else {
    m.s = 0; m.m = false; m.need = Math.min(BAL.masteryNeedMax, m.need+1);
  }
  const cat = (q.category||'GEN').toUpperCase();
  const st = Profile.data.stats;
  st.qa++; if (correct) st.qc++;
  const bc = st.byCat[cat] || (st.byCat[cat] = {a:0,c:0});
  bc.a++; if (correct) bc.c++;
  return newlyMastered;
}

/* ---- upload parsing & validation (schema: question, choices, answer, +optional why/difficulty/skin/category/id) ---- */
function parseCSV(text){
  const rows=[]; let row=[], cur='', inQ=false;
  for (let i=0;i<text.length;i++){
    const ch=text[i];
    if (inQ){ if (ch==='"'){ if (text[i+1]==='"'){cur+='"';i++;} else inQ=false; } else cur+=ch; }
    else if (ch==='"') inQ=true;
    else if (ch===','){ row.push(cur); cur=''; }
    else if (ch==='\n' || ch==='\r'){ if (ch==='\r'&&text[i+1]==='\n') i++; row.push(cur); if (row.some(c=>c.trim()!=='')) rows.push(row); row=[]; cur=''; }
    else cur+=ch;
  }
  row.push(cur); if (row.some(c=>c.trim()!=='')) rows.push(row);
  return rows;
}
function validateRows(raw){
  // raw: array of plain objects with lowercase keys
  const ok=[], skipped=[];
  const DIFF=['easy','medium','hard'], SKIN=['theory','onboarding','both'];
  raw.forEach((r,i)=>{
    const n=i+1;
    const fail=reason=>skipped.push({n, reason});
    const question=(r.question||'').toString().trim();
    if (!question) return fail('question is empty');
    let choices = r.choices;
    if (typeof choices === 'string') choices = choices.split('|');
    if (!Array.isArray(choices)) return fail('choices missing');
    choices = choices.map(c=>c.toString().trim()).filter(c=>c!=='');
    if (choices.length<2 || choices.length>6) return fail('needs 2–6 choices');
    const folded = choices.map(c=>c.toLowerCase());
    if (new Set(folded).size !== folded.length) return fail('duplicate choice text');
    const answer=(r.answer||'').toString().trim();
    const ai = folded.indexOf(answer.toLowerCase());
    if (ai<0) return fail("answer doesn't match any choice");
    let difficulty=(r.difficulty||'').toString().trim().toLowerCase();
    if (difficulty && !DIFF.includes(difficulty)) return fail('invalid difficulty "'+difficulty+'"');
    let skin=(r.skin||'').toString().trim().toLowerCase();
    if (skin && !SKIN.includes(skin)) return fail('invalid skin "'+skin+'"');
    ok.push({
      question, choices, answer:choices[ai],
      why:(r.why||'').toString().trim(),
      difficulty: difficulty||'medium',
      category:(r.category||'').toString().trim().toUpperCase()||'GEN',
      id:(r.id||'').toString().trim()||undefined
    });
  });
  return {ok, skipped};
}
function parseQuestionFile(name, text){
  // returns {ok, skipped, error}
  const isJSON = /\.json$/i.test(name) || text.trim().startsWith('[') || text.trim().startsWith('{');
  try {
    if (isJSON){
      let d = JSON.parse(text);
      if (d && Array.isArray(d.questions)) d = d.questions;
      if (!Array.isArray(d)) return {error:'JSON must be an array of questions (or {"questions":[…]})'};
      const raw = d.map(o=>{ const r={}; for (const k in o) r[k.toLowerCase()]=o[k]; return r; });
      return validateRows(raw);
    }
    const rows = parseCSV(text);
    if (rows.length < 2) return {error:'CSV needs a header row plus at least one question row'};
    const head = rows[0].map(h=>h.trim().toLowerCase());
    if (!head.includes('question')) return {error:'CSV header must include a "question" column'};
    const raw = rows.slice(1).map(cells=>{ const r={}; head.forEach((h,i)=>r[h]=cells[i]!==undefined?cells[i]:''); return r; });
    return validateRows(raw);
  } catch(e){ return {error:'File could not be parsed: '+e.message}; }
}

/* ---- question drawing pool (per run) ---- */
function makeSession(){ return {correct:new Set(), recent:[]}; }
function nextQuestion(gateIdx, sess){
  const qs = Bank.active().questions;
  let cand = qs.filter(q=>!sess.correct.has(qKey(q)));
  if (!cand.length){ sess.correct.clear(); cand = qs.slice(); }
  const c2 = cand.filter(q=>!sess.recent.includes(qKey(q)));
  if (c2.length) cand = c2;
  const unm = cand.filter(q=>{ const m=Profile.data.mastery[qKey(q)]; return !(m&&m.m); });
  if (unm.length) cand = unm;
  const hasTags = qs.some(q=>q.difficulty && q.difficulty!=='medium');
  if (hasTags){
    const pref = gateIdx<2 ? ['easy','medium','hard'] : gateIdx<4 ? ['medium','easy','hard'] : ['medium','hard','easy'];
    for (const p of pref){ const f=cand.filter(q=>(q.difficulty||'medium')===p); if (f.length){ cand=f; break; } }
  }
  const q = pick(cand);
  sess.recent.push(qKey(q)); if (sess.recent.length>2) sess.recent.shift();
  return q;
}

/* ---- audio: tiny synthesized beeps (WebAudio), mute persisted ---- */
const Snd = {
  ctx:null,
  ensure(){ if (!this.ctx){ try { this.ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} } if (this.ctx&&this.ctx.state==='suspended') this.ctx.resume(); },
  beep(f0, dur, type='sine', vol=0.14, f1){
    if (Profile.data.mute) return; this.ensure(); if (!this.ctx) return;
    const t = this.ctx.currentTime, o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, t);
    if (f1) o.frequency.exponentialRampToValueAtTime(f1, t+dur);
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(this.ctx.destination); o.start(t); o.stop(t+dur+0.02);
  },
  click(){ this.beep(330, 0.06, 'square', 0.06); },
  jump(){ this.beep(300, 0.16, 'sine', 0.1, 560); },
  coin(){ this.beep(880, 0.09, 'square', 0.07, 1320); },
  ok(){ this.beep(523, 0.12, 'sine', 0.12, 659); setTimeout(()=>this.beep(784,0.16,'sine',0.1),90); },
  no(){ this.beep(220, 0.22, 'sawtooth', 0.06, 160); },
  hit(){ this.beep(110, 0.2, 'square', 0.12, 70); },
  buy(){ this.beep(660, 0.1, 'sine', 0.1, 880); },
  level(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>this.beep(f,0.14,'sine',0.1), i*90)); },
  over(){ this.beep(392, 0.3, 'sine', 0.1, 262); }
};

function makeBtn(scene, x, y, w, h, label, onClick, opts={}){
  const kind = opts.kind||'ghost';
  const P = {
    primary:{f:C.teal,  fh:0x5EEAD4, t:S.ink,   line:null},
    amber:  {f:C.amber, fh:0xFCD34D, t:'#231703', line:null},
    violet: {f:C.violet,fh:0xC4B5FD, t:'#1B1233', line:null},
    ghost:  {f:C.panel, fh:0x21335A, t:S.text,  line:C.line},

  }[kind];
  const ct = scene.add.container(x, y);
  const g = scene.add.graphics();
  const draw = fill=>{
    g.clear(); g.fillStyle(fill,1); g.fillRoundedRect(-w/2,-h/2,w,h,10);
    if (P.line!==null){ g.lineStyle(1.5,P.line,1); g.strokeRoundedRect(-w/2,-h/2,w,h,10); }
  };
  draw(P.f);
  const t = T(scene, 0, 0, label, opts.size||Math.round(h*0.38), P.t, {fontStyle:opts.bold===false?'':'bold'}).setOrigin(0.5);
  ct.add([g,t]);
  ct.setSize(w,h);
  ct.setInteractive({useHandCursor:true});
  ct.enabled = true;
  ct.on('pointerover', ()=>{ if (ct.enabled) draw(P.fh); });
  ct.on('pointerout', ()=>draw(P.f));
  ct.on('pointerup', ()=>{ if (!ct.enabled) return; Snd.click(); onClick(); });
  ct.setLabel = s=>t.setText(s);

}

/* ---- file helpers (upload) ---- */
let fileInput = null;
function pickFile(cb){
  if (!fileInput){ fileInput=document.createElement('input'); fileInput.type='file'; fileInput.accept='.csv,.json'; fileInput.style.display='none'; document.body.appendChild(fileInput); }
  fileInput.onchange = ()=>{ const f=fileInput.files[0]; fileInput.value=''; if (f) cb(f); };
  fileInput.click();
}
function readFile(f, cb){ const r=new FileReader(); r.onload=()=>cb(r.result); r.readAsText(f); }
function handleQuestionFile(f, summaryCb){
  readFile(f, text=>{
    const res = parseQuestionFile(f.name, text);
    if (res.error){ summaryCb('Could not load: '+res.error, false); return; }
    let msg = 'Loaded '+res.ok.length+' questions from '+f.name;
    if (res.skipped.length) msg += '\nSkipped '+res.skipped.length+':\n' + res.skipped.slice(0,4).map(s=>'  row '+s.n+' — '+s.reason).join('\n') + (res.skipped.length>4 ? '\n  …and '+(res.skipped.length-4)+' more' : '');
    if (res.ok.length < 5){ summaryCb('Only '+res.ok.length+' valid questions (need at least 5) — keeping the current bank.\n'+msg, false); return; }
    Bank.install(res.ok, f.name);
    summaryCb(msg + '\nThis bank is now active.', true);
  });
}

  const blob = new Blob([TEMPLATE_CSV], {type:'text/csv'});

}

  update(){
    this.far.tilePositionX += 0.06; this.mid.tilePositionX += 0.14;
    this.fen.tilePositionX += 0.3;  this.road.tilePositionX += 0.4;
  }
  refresh(){
    const p = Profile.data, lv = Profile.level();
    const v = VEHICLES.find(v=>v.id===p.vehicle);
    this.prevVeh.setTexture('veh_'+v.id);
    this.prevName.setText(v.name);
    this.prevBlurb.setText(v.blurb);
    this.lvText.setText('LV '+lv+' · '+Profile.rank());
    const cur=xpTotalFor(lv), next=xpTotalFor(lv+1), pct=clamp((p.xp-cur)/(next-cur),0,1);
    this.xpBarBg.clear();
    this.xpBarBg.fillStyle(C.line,1); this.xpBarBg.fillRoundedRect(190,H-28,160,8,4);
    this.xpBarBg.fillStyle(C.violet,1); this.xpBarBg.fillRoundedRect(190,H-28,Math.max(8,160*pct),8,4);

    this.bestText.setText('BEST '+fmt(p.best)+' m');
    this.sndBtn.setLabel('SOUND: '+(p.mute?'OFF':'ON'));
    const D = diffMode();
    this.diffBtn.setLabel('DIFFICULTY: '+D.label);
    this.diffNote.setText(D.blurb);
  }
  cycleVeh(dir){
    const owned = VEHICLES.filter(v=>Profile.data.owned.includes(v.id));
    let i = owned.findIndex(v=>v.id===Profile.data.vehicle);
    i = (i+dir+owned.length)%owned.length;
    Profile.data.vehicle = owned[i].id; Profile.save(); this.refresh();
  }

  openOverlay(build){
    this.closeOverlay();
    const ct = this.add.container(0,0).setDepth(50);
    const dim = this.add.rectangle(W/2,H/2,W,H,C.dark,0.74).setInteractive();
    ct.add(dim);
    build(ct);
    this.overlay = ct;
  }
  closeOverlay(){ if (this.overlay){ this.overlay.destroy(); this.overlay=null; window.__dropHandler=null; } }
  addClose(ct, x, y){ const b = makeBtn(this, x, y, 40, 40, 'X', ()=>this.closeOverlay(), {kind:'danger'}); ct.add(b); return b; }

  openGarage(){
    this.openOverlay(ct=>{
      ct.add(makePanel(this, 30, 46, 900, 458, {fill:C.bg2, alpha:0.98}));
      ct.add(T(this, 56, 66, 'GARAGE', 24, S.text, {fontStyle:'bold'}));
      ct.add(T(this, 56, 96, 'Every rig runs the same site — pick the one that feels like yours.', 13, S.muted));
      ct.add(coinIcon(this, 806, 80, 0.9));
      ct.add(T(this, 822, 71, fmt(Profile.data.coins), 17, S.amber, {fontFamily:F.mono, fontStyle:'bold'}));
      this.addClose(ct, 898, 78);
      const p = Profile.data, lv = Profile.level();
      VEHICLES.forEach((v,i)=>{
        const cx = 52 + (i%4)*218, cy = 126 + Math.floor(i/4)*186;
        ct.add(makePanel(this, cx, cy, 200, 172, {fill:C.panel}));
        const locked = lv < v.unlock;
        const img = this.add.image(cx+100, cy+92, 'veh_'+v.id).setOrigin(0.5,1).setScale(0.725);
        if (locked) img.setAlpha(0.28);
        ct.add(img);
        ct.add(T(this, cx+100, cy+100, v.name, 15, locked?S.muted:S.text, {fontStyle:'bold'}).setOrigin(0.5,0));
        const by = cy+144;
        if (locked){
          ct.add(T(this, cx+100, by, 'LOCKED — REACH LV '+v.unlock, 13, S.muted, {fontStyle:'bold'}).setOrigin(0.5));
        } else if (!p.owned.includes(v.id)){
          const afford = p.coins >= v.cost;
          const b = makeBtn(this, cx+100, by, 150, 34, 'BUY  '+fmt(v.cost), ()=>{
            if (Profile.data.coins < v.cost) return;
            Profile.data.coins -= v.cost; Profile.data.owned.push(v.id); Profile.data.vehicle = v.id;
            Profile.save(); Snd.buy(); this.refresh(); this.openGarage();
          }, {kind:'amber'});
          if (!afford) b.setEnabled(false);
          ct.add(b);
        } else if (p.vehicle === v.id){
          const b = makeBtn(this, cx+100, by, 150, 34, 'SELECTED', ()=>{}, {kind:'primary'}); b.setEnabled(false); b.setAlpha(1);
          ct.add(b);
        } else {
          ct.add(makeBtn(this, cx+100, by, 150, 34, 'SELECT', ()=>{ Profile.data.vehicle=v.id; Profile.save(); this.refresh(); this.openGarage(); }));
        }
      });
    });
  }

  openTraining(){
    this.openOverlay(ct=>{
      ct.add(makePanel(this, 90, 60, 780, 420, {fill:C.bg2, alpha:0.98}));
      ct.add(T(this, 118, 82, 'TRAINING YARD', 24, S.text, {fontStyle:'bold'}));
      ct.add(T(this, 118, 112, 'Train your rig between shifts — the Duck Life way. Coins come mostly from checkpoint questions.', 13, S.muted));
      ct.add(coinIcon(this, 746, 96, 0.9));
      ct.add(T(this, 762, 87, fmt(Profile.data.coins), 17, S.amber, {fontFamily:F.mono, fontStyle:'bold'}));
      this.addClose(ct, 838, 92);
      const p = Profile.data;
      const rows = [
        {key:'eng', name:'ENGINE', max:BAL.engMax, lvl:p.eng, cost:BAL.engCost(p.eng),
         desc:'Raises top speed — meters and coins come faster.\nTop speed now: '+(Profile.maxSpeed()/BAL.pxPerMeter).toFixed(1)+' m/s'},

         desc:'Extra hard hats — each one absorbs a near-miss.\nHard hats at shift start: '+(BAL.hatsBase+p.plat)}
      ];

        const y = 168 + i*88;

        ct.add(T(this, 122, y+12, r.desc, 12, S.muted, {lineSpacing:3}));

          if (k < r.lvl){ pg.fillStyle(C.teal,1); pg.fillRoundedRect(px2, y-8, 14, 26, 3); }
          else { pg.lineStyle(1.5,C.line,1); pg.strokeRoundedRect(px2, y-8, 14, 26, 3); }
        }
        if (r.lvl >= r.max){
          const b = makeBtn(this, 762, y+5, 130, 40, 'MAX', ()=>{}); b.setEnabled(false); ct.add(b);
        } else {
          const b = makeBtn(this, 762, y+5, 130, 40, 'TRAIN  '+fmt(r.cost), ()=>{
            if (Profile.data.coins < r.cost) return;
            Profile.data.coins -= r.cost; Profile.data[r.key]++;
            Profile.save(); Snd.level(); this.refresh(); this.openTraining();
          }, {kind:'amber', size:14});
          if (p.coins < r.cost) b.setEnabled(false);
          ct.add(b);
        }
      });
      ct.add(T(this, 480, 448, 'Correct checkpoint answers also restore a hard hat mid-run — knowledge is protection.', 12, S.green).setOrigin(0.5));
    });

  openStats(){
    this.openOverlay(ct=>{
      ct.add(makePanel(this, 130, 60, 700, 420, {fill:C.bg2, alpha:0.98}));

      const b = Bank.active();

  }

    this.add.image(0,0,'sky'+TH).setOrigin(0);
    this.far  = this.add.tileSprite(0,190,W,180,'skyline'+TH).setOrigin(0);
    this.midL = this.add.tileSprite(0,250,W,160,'mid'+TH).setOrigin(0).setAlpha(day?0.75:0.55);
    this.fen  = this.add.tileSprite(0,GROUND-80,W,80,'fence'+TH).setOrigin(0).setDepth(2);
    this.road = this.add.tileSprite(0,GROUND,W,70,'road'+TH).setOrigin(0).setDepth(3);

    /* player */
    this.player = this.add.container(PX, GROUND).setDepth(7);
    const hl = this.add.graphics(); hl.fillStyle(C.amber, day?0.05:0.08); hl.fillTriangle(28,-16,150,-2,150,-34);
    this.veh = this.add.image(0,0,'veh_'+p.vehicle).setOrigin(0.5,1).setScale(0.5);
    this.beacon = this.add.circle(4,-60,4,C.amber).setAlpha(0.9);
    this.player.add([hl, this.veh, this.beacon]);
    if (!REDUCED) this.tweens.add({targets:this.beacon, alpha:0.15, duration:500, yoyo:true, repeat:-1});
    this.pVelY = 0; this.onGround = true; this.duckHeld = false; this.duckPointer = false;

    /* HUD */
    const bar = this.add.graphics().setDepth(10);
    bar.fillStyle(C.bg2,0.88); bar.fillRect(0,0,W,46); bar.lineStyle(1,C.line,1); bar.lineBetween(0,46,W,46);
    this.distText = T(this, 16, 9, '0 m', 22, S.text, {fontFamily:F.mono, fontStyle:'bold'}).setDepth(10);
    coinIcon(this, 208, 24, 0.9).setDepth(10);
    this.coinText = T(this, 224, 12, '0', 18, S.amber, {fontFamily:F.mono, fontStyle:'bold'}).setDepth(10);
    this.streakText = T(this, 480, 23, '', 15, S.teal, {fontFamily:F.mono, fontStyle:'bold'}).setOrigin(0.5).setDepth(10);
    this.lvText = T(this, W-88, 23, 'LV '+Profile.level(), 15, S.violet, {fontFamily:F.mono, fontStyle:'bold'}).setOrigin(0.5).setDepth(10);
    this.hatIcons = [];
    for (let i=0;i<this.maxHats;i++) this.hatIcons.push(this.add.image(W-136-i*30, 23, 'hat').setScale(0.5).setDepth(10));
    const pauseBtn = makeBtn(this, W-32, 23, 34, 34, 'II', ()=>this.togglePause(), {size:13}); pauseBtn.setDepth(10);
    this.tipText = T(this, 480, 66, '', 14, S.amber, {fontStyle:'bold', stroke:S.dark, strokeThickness:4}).setOrigin(0.5).setDepth(11).setAlpha(0);

    if (p.stats.runs < 3){
      const hint = T(this, 480, 130, 'SPACE / TAP RIGHT — JUMP        DOWN / HOLD LEFT — DUCK', 15, S.text, {fontStyle:'bold', stroke:S.dark, strokeThickness:4}).setOrigin(0.5).setDepth(11);
      this.tweens.add({targets:hint, alpha:0, delay:3200, duration:600, onComplete:()=>hint.destroy()});
    }

    /* input */
    const kb = this.input.keyboard;
    kb.on('keydown-SPACE', e=>{ e.preventDefault(); this.jump(); });
    kb.on('keydown-UP',    ()=>this.jump());
    kb.on('keydown-DOWN',  ()=>{ this.duckHeld = true; });
    kb.on('keyup-DOWN',    ()=>{ this.duckHeld = false; });
    kb.on('keydown-P',     ()=>this.togglePause());
    kb.on('keydown-ESC',   ()=>this.togglePause());
    this.input.on('pointerdown', pt=>{
      const px2 = pt.worldX !== undefined ? pt.worldX : pt.x, py = pt.worldY !== undefined ? pt.worldY : pt.y;
      if (this.state !== 'run' || py < 50) return;
      Snd.ensure();
      if (px2 < W*0.38) this.duckPointer = true; else this.jump();
    });
    this.input.on('pointerup', ()=>{ this.duckPointer = false; });
    this.events.on('shutdown', ()=>kb.removeAllListeners());
  }

  jump(){
    if (this.state !== 'run' || !this.onGround) return;
    this.pVelY = BAL.jumpVel; this.onGround = false; Snd.jump();
  }

  update(time, deltaMs){
    if (this.state !== 'run') return;
    const slow = time < this.slowUntil ? 0.45 : 1;
    const dt = Math.min(deltaMs, 50)/1000 * slow;
    this.speed = Math.min(Profile.startSpeed() + this.meters*Profile.ramp(),
                          Profile.maxSpeed() + this.meters*BAL.creep) * this.D.speed;
    const v = this.speed;
    this.dist += v*dt; this.meters = this.dist/BAL.pxPerMeter;

    this.far.tilePositionX  = this.dist*0.08;
    this.midL.tilePositionX = this.dist*0.18;
    this.fen.tilePositionX  = this.dist*0.55;
    this.road.tilePositionX = this.dist;

    /* player physics */
    const ducking = (this.duckHeld || this.duckPointer) && this.onGround;
    this.player.scaleY += ((ducking?0.6:1) - this.player.scaleY) * Math.min(1, dt*20);
    if (!this.onGround){
      if (this.duckHeld || this.duckPointer) this.pVelY += BAL.fastFall*dt;
      this.pVelY += BAL.gravity*dt;
      this.player.y += this.pVelY*dt;
      if (this.player.y >= GROUND){ this.player.y = GROUND; this.pVelY = 0; this.onGround = true; }
      this.veh.rotation = this.pVelY < 0 ? -0.07 : 0.06;
    } else {
      this.veh.rotation = 0;
      this.veh.y = Math.sin(time/90)*1.5;
    }

    /* spawn: obstacles, coins, gates */
    const lead = 1060 - PX;                       // px of travel before a spawn meets the player
    const gatePx = this.nextGateM * BAL.pxPerMeter;
    if (this.dist >= this.nextObsDist){
      const worldPos = this.dist + lead;
      if (Math.abs(worldPos - gatePx) < 450) this.nextObsDist = this.dist + 520;
      else { this.spawnObstacle(); this.nextObsDist = this.dist + (v*rand(0.78, 1.35) + 150) * this.D.gap; }
    }
    if (this.dist >= this.nextCoinDist){
      const worldPos = this.dist + lead;
      if (Math.abs(worldPos - gatePx) < 380) this.nextCoinDist = this.dist + 420;
      else { this.spawnCoins(); this.nextCoinDist = this.dist + rand(BAL.coinRowMinM, BAL.coinRowMaxM)*BAL.pxPerMeter; }
    }
    if (this.gateSpawnedFor !== this.nextGateM && this.dist >= gatePx - lead) this.spawnGate();

    /* move + collide */
    const ph = 56*this.player.scaleY - 8;
    const py2 = this.player.y, py1 = py2 - ph;
    const px1 = PX-30, px2 = PX+30;
    for (let i=this.obstacles.length-1; i>=0; i--){
      const o = this.obstacles[i];
      o.x -= v*dt; o.img.x = o.x;
      if (o.x < -170){ o.img.destroy(); this.obstacles.splice(i,1); continue; }
      if (o.hit) continue;
      const ox1 = o.x+4, ox2 = o.x + o.def.w - 4;
      let oy1, oy2;
      if (o.def.kind === 'jump'){ oy1 = GROUND - o.def.h; oy2 = GROUND; }
      else { oy1 = 0; oy2 = DUCK_BOTTOM; }
      if (px1 < ox2 && px2 > ox1 && py1 < oy2 && py2 > oy1 && time > this.invulnUntil){
        o.hit = true; this.nearMiss(o, time);
        if (this.state !== 'run') return;
      }
    }
    for (let i=this.coinsArr.length-1; i>=0; i--){
      const c = this.coinsArr[i];
      c.x -= v*dt; c.img.x = c.x;
      if (c.x < -30){ c.img.destroy(); this.coinsArr.splice(i,1); continue; }
      if (Math.abs(c.x-PX) < 32 && c.y > py1-14 && c.y < py2+10){
        this.coinsArr.splice(i,1);
        this.coinsPickups += BAL.coinVal; Snd.coin();
        this.tweens.add({targets:c.img, y:c.img.y-26, alpha:0, duration:240, onComplete:()=>c.img.destroy()});
        this.refreshHUD();
      }
    }
    for (let i=this.gates.length-1; i>=0; i--){
      const gt = this.gates[i];
      gt.x -= v*dt; gt.ct.x = gt.x;
      if (gt.x < -200){ gt.ct.destroy(); this.gates.splice(i,1); continue; }
      if (!gt.done && gt.x + 65 <= PX){ gt.done = true; this.askQuestion(); return; }
    }
    this.refreshHUD();
  }

  refreshHUD(){
    this.distText.setText(fmt(this.meters)+' m');
    this.coinText.setText(fmt(this.coinsGates + this.coinsPickups));
    this.streakText.setText(this.streak >= 2 ? 'STREAK ×'+this.streak : '');
    this.hatIcons.forEach((h,i)=>h.setAlpha(i < this.hats ? 1 : 0.22));
    this.lvText.setText('LV '+Profile.level());
  }

  spawnObstacle(){
    const av = OBS.filter(o=>this.meters >= o.minM);
    const ducks = av.filter(o=>o.kind==='duck'), jumps = av.filter(o=>o.kind==='jump');
    const def = (ducks.length && Math.random() < 0.35) ? pick(ducks) : pick(jumps);
    let img;
    if (def.kind === 'duck')        img = this.add.image(1060, 0, 'obs_'+def.id).setOrigin(0,0).setScale(0.5).setDepth(6);
    else if (def.id === 'trench')   img = this.add.image(1060, GROUND+16, 'obs_'+def.id).setOrigin(0,1).setScale(0.5).setDepth(6);
    else                            img = this.add.image(1060, GROUND, 'obs_'+def.id).setOrigin(0,1).setScale(0.5).setDepth(6);
    this.obstacles.push({def, img, x:1060, hit:false});
  }
  spawnCoins(){
    const n = irand(3,5), y = pick([GROUND-26, GROUND-62, GROUND-100]);
    for (let i=0;i<n;i++){
      const x = 1060 + i*28;
      this.coinsArr.push({x, y, img:this.add.image(x, y, 'coin').setScale(0.5).setDepth(5)});
    }
  }
  spawnGate(){
    this.gateSpawnedFor = this.nextGateM;
    const ct = this.add.container(1060, GROUND-232).setDepth(4);
    ct.add(this.add.image(0,0,'gate').setOrigin(0).setScale(0.5));
    ct.add(T(this, 65, 38, 'CHECKPOINT', 13, S.teal, {fontFamily:F.mono, fontStyle:'bold'}).setOrigin(0.5));
    this.gates.push({x:1060, ct, done:false});
  }

  nearMiss(o, time){
    if (this.hats > 0){
      this.hats--; Snd.hit();
      this.invulnUntil = time + BAL.invulnMs; this.slowUntil = time + BAL.slowmoMs;
      this.tipText.setText('NEAR-MISS — '+o.def.tip).setAlpha(1);
      this.tweens.add({targets:this.tipText, alpha:0, delay:2200, duration:500});
      if (!REDUCED) this.cameras.main.shake(130, 0.004);
      const flash = this.add.rectangle(W/2,H/2,W,H,C.coral,0.18).setDepth(9);
      this.tweens.add({targets:flash, alpha:0, duration:300, onComplete:()=>flash.destroy()});
      this.tweens.add({targets:this.player, alpha:0.35, duration:130, yoyo:true, repeat:4, onComplete:()=>this.player.setAlpha(1)});
      this.refreshHUD();
    } else {
      this.endShift(o);
    }
  }

  /* ---- checkpoint question (learning gate) ---- */
  askQuestion(){
    this.state = 'question';
    const q = nextQuestion(this.gateIdx, this.sess);
    this.gateIdx++;
    this.lastQ = q;
    this.buildCard(q);
  }
  buildCard(q){
    const ct = this.add.container(0,0).setDepth(20);
    this.card = ct;
    ct.add(this.add.rectangle(W/2,H/2,W,H,C.dark,0.66).setInteractive());
    const choices = shuffle(q.choices);
    const prompt = T(this, W/2, 0, q.question, 17, S.text, {fontStyle:'bold', wordWrap:{width:552}, align:'center'}).setOrigin(0.5,0);
    const promptH = prompt.height;
    const n = choices.length;
    const panelH = 104 + promptH + 16 + n*52 + 92;
    const y0 = Math.max(30, (H-panelH)/2);
    ct.add(makePanel(this, W/2-310, y0, 620, panelH, {fill:C.bg2, alpha:0.98}));
    /* header: category + difficulty, mastery pips */
    const cat = (q.category||'GEN'), diff = q.difficulty||'medium';
    const dcol = diff==='easy'?C.green:diff==='hard'?C.coral:C.amber;
    const hdr = this.add.graphics();
    hdr.fillStyle(C.panel,1); hdr.fillRoundedRect(W/2-286, y0+18, 150, 26, 6);
    hdr.fillStyle(dcol,1); hdr.fillCircle(W/2-272, y0+31, 5);
    ct.add(hdr);
    ct.add(T(this, W/2-260, y0+24, cat+' · '+diff.toUpperCase(), 12, S.muted, {fontFamily:F.mono}));
    ct.add(T(this, W/2, y0+24, 'CHECKPOINT '+this.gateIdx, 13, S.teal, {fontFamily:F.mono, fontStyle:'bold'}).setOrigin(0.5,0));
    const m = Profile.data.mastery[qKey(q)] || {s:0, need:2, m:false};
    const pips = this.add.graphics(); ct.add(pips);
    if (m.m){ ct.add(T(this, W/2+284, y0+22, '★ MASTERED', 13, S.teal, {fontFamily:F.mono, fontStyle:'bold'}).setOrigin(1,0)); }
    else for (let i=0;i<m.need;i++){
      const px2 = W/2+284 - (m.need-i)*17;
      if (i < m.s){ pips.fillStyle(C.teal,1); pips.fillRoundedRect(px2, y0+20, 12, 18, 3); }
      else { pips.lineStyle(1.5,C.line,1); pips.strokeRoundedRect(px2, y0+20, 12, 18, 3); }
    }
    prompt.setY(y0+62); ct.add(prompt);
    const cy0 = y0 + 62 + promptH + 18;
    const btns = [];
    let locked = false;
    this.cardAnswered = false;
    choices.forEach((choice,i)=>{
      const b = makeBtn(this, W/2, cy0 + i*52 + 22, 560, 44, choice, ()=>{
        if (locked) return; locked = true;
        this.resolveAnswer(q, choice, choices, btns, ct, cy0, y0, panelH);
      }, {size:15, bold:false});
      btns.push(b); ct.add(b);
    });
  }
  resolveAnswer(q, choice, choices, btns, ct, cy0, y0, panelH){
    const correct = choice === q.answer;
    this.qa++; if (correct) this.qc++;
    const newly = recordAnswer(q, correct);
    let xpAdd = BAL.xpGate, reward = '';
    if (correct){
      this.sess.correct.add(qKey(q));
      this.streak++; this.bestStreak = Math.max(this.bestStreak, this.streak);
      const pay = Math.round(BAL.gateGold[Math.min(this.streak-1, BAL.gateGold.length-1)] * this.D.coin);
      this.coinsGates += pay;
      reward = '+'+pay+' coins' + (this.streak>1 ? '  ·  streak ×'+this.streak : '');
      if (this.hats < this.maxHats){ this.hats++; reward += '  ·  hard hat restored'; }
      xpAdd += BAL.xpCorrect; this.xpAns += BAL.xpCorrect;
      if (newly){ xpAdd += BAL.xpMaster; this.xpMast += BAL.xpMaster; this.masteredRun++; reward += '  ·  ★ mastered'; }
      Snd.ok();
    } else {
      this.streak = 0;
      reward = 'No coins this time — streak reset.';
      Snd.no();
    }
    const leveled = Profile.addXP(xpAdd);
    Profile.save();
    /* mark buttons */
    const mark = this.add.graphics(); ct.add(mark);
    choices.forEach((c,i)=>{
      const by = cy0 + i*52 + 22;
      if (c === q.answer){ mark.lineStyle(2.5, C.green, 1); mark.strokeRoundedRect(W/2-280, by-22, 560, 44, 10); }
      else if (c === choice){ mark.lineStyle(2.5, C.coral, 1); mark.strokeRoundedRect(W/2-280, by-22, 560, 44, 10); }
    });
    btns.forEach(b=>b.setEnabled(false));
    btns[choices.indexOf(q.answer)].setAlpha(1);
    const fy = cy0 + choices.length*52 + 6;
    ct.add(T(this, W/2, fy, reward, 14, correct?S.green:S.coral, {fontStyle:'bold'}).setOrigin(0.5,0));
    if (q.why) ct.add(T(this, W/2, fy+24, q.why, 13, S.muted, {wordWrap:{width:540}, align:'center', fontStyle:'italic'}).setOrigin(0.5,0));
    if (leveled){
      Snd.level();
      ct.add(T(this, W/2, y0-24, 'LEVEL UP — LV '+Profile.level()+' · '+Profile.rank(), 16, S.violet, {fontStyle:'bold'}).setOrigin(0.5));
    }
    const go = makeBtn(this, W/2, y0+panelH-34, 200, 42, 'CONTINUE', ()=>this.closeCard(), {kind:'primary'});
    ct.add(go);
    this.cardAnswered = true;
    this.input.keyboard.once('keydown-ENTER', ()=>{ if (this.state==='question' && this.cardAnswered) this.closeCard(); });
    this.refreshHUD();
  }
  closeCard(){
    if (!this.card) return;
    this.card.destroy(); this.card = null;
    this.gateSpacing = Math.min(BAL.gateMax, this.gateSpacing + BAL.gateStep);
    this.nextGateM += this.gateSpacing;
    this.resumeCountdown();
  }
  resumeCountdown(){
    this.state = 'count';
    const seq = REDUCED ? ['GO'] : ['3','2','1'];
    let i = 0;
    const step = ()=>{
      if (i >= seq.length){ this.state = 'run'; return; }
      const t = T(this, 480, 240, seq[i], 54, S.teal, {fontStyle:'bold', fontFamily:F.mono, stroke:S.dark, strokeThickness:6}).setOrigin(0.5).setDepth(21);
      this.tweens.add({targets:t, alpha:0, scale:1.5, duration:330, onComplete:()=>t.destroy()});
      i++; this.time.delayedCall(340, step);
    };
    step();
  }

  togglePause(){
    if (this.state === 'run'){
      this.state = 'pause';
      const ct = this.add.container(0,0).setDepth(30);
      ct.add(this.add.rectangle(W/2,H/2,W,H,C.dark,0.7).setInteractive());
      ct.add(makePanel(this, W/2-170, 160, 340, 230, {fill:C.bg2, alpha:0.98}));
      ct.add(T(this, W/2, 196, 'PAUSED', 26, S.text, {fontStyle:'bold'}).setOrigin(0.5));
      ct.add(makeBtn(this, W/2, 250, 240, 44, 'RESUME', ()=>{ ct.destroy(); this.pauseCt=null; this.state='run'; }, {kind:'primary'}));
      const snd = makeBtn(this, W/2, 302, 240, 40, 'SOUND: '+(Profile.data.mute?'OFF':'ON'), ()=>{
        Profile.data.mute = !Profile.data.mute; Profile.save();
        snd.setLabel('SOUND: '+(Profile.data.mute?'OFF':'ON'));
      });
      ct.add(snd);
      ct.add(makeBtn(this, W/2, 350, 240, 40, 'QUIT TO MENU', ()=>{ ct.destroy(); this.scene.start('Menu'); }, {kind:'danger'}));
      this.pauseCt = ct;
    } else if (this.state === 'pause'){
      if (this.pauseCt){ this.pauseCt.destroy(); this.pauseCt = null; }
      this.state = 'run';
    }
  }

  endShift(o){
    if (this.state === 'over') return;
    this.state = 'over';
    Snd.over(); Snd.hit();
    if (!REDUCED) this.cameras.main.shake(220, 0.006);
    this.veh.setTint(0xF87171);
    this.tipText.setText('NEAR-MISS — '+o.def.tip).setAlpha(1);
    const meters = Math.floor(this.meters);
    const distCoins = Math.round(Math.floor(meters / BAL.distCoinPer) * this.D.coin);
    const total = this.coinsGates + this.coinsPickups + distCoins;
    const p = Profile.data;
    p.coins += total;
    const xpDist = Math.floor(meters/100) * BAL.xpPer100m;
    const newBest = meters > p.best;
    const xpBest = newBest ? BAL.xpBest : 0;
    if (newBest) p.best = meters;
    const lvBefore = Profile.level();
    Profile.addXP(xpDist + xpBest);
    p.stats.runs++; p.stats.meters += meters; p.stats.coins += total;
    Profile.save();
    const data = {
      meters, coinsGates:this.coinsGates, coinsPickups:this.coinsPickups, distCoins, total,
      qa:this.qa, qc:this.qc, bestStreak:this.bestStreak, masteredRun:this.masteredRun, diffLabel:this.D.label,
      xpAns:this.xpAns, xpMast:this.xpMast, xpDist, xpBest, newBest,
      lvBefore, lvAfter:Profile.level()
    };
    this.time.delayedCall(950, ()=>this.scene.start('Over', data));
  }
}

/* =========================================================================
   SHIFT COMPLETE — recap, XP, level bar
   ========================================================================= */
class OverScene extends Phaser.Scene {
  constructor(){ super('Over'); }
  init(data){ this.d = data; this.sys.settings.data = {}; }
  create(){
    const d = this.d;
    setupCam(this);
    const TH = themeSfx();
    this.add.image(0,0,'sky'+TH).setOrigin(0);
    this.add.tileSprite(0,190,W,180,'skyline'+TH).setOrigin(0);
    this.add.tileSprite(0,GROUND,W,70,'road'+TH).setOrigin(0);
    this.add.rectangle(W/2,H/2,W,H,C.dark,0.55);
    makePanel(this, 210, 40, 540, 460, {fill:C.bg2, alpha:0.98});
    T(this, W/2, 72, 'SHIFT COMPLETE', 30, S.amber, {fontStyle:'bold'}).setOrigin(0.5);
    T(this, W/2, 102, pick(['Every near-miss is a lesson.','Safe site, strong score.','The best crews learn every shift.','Report it, fix it, run it again.']), 13, S.muted).setOrigin(0.5);

    if (d.newBest){
      const nb = T(this, W/2, 128, 'NEW SITE BEST', 15, S.amber, {fontStyle:'bold', fontFamily:F.mono}).setOrigin(0.5);
      if (!REDUCED) this.tweens.add({targets:nb, alpha:0.4, duration:500, yoyo:true, repeat:-1});
    }
    T(this, W/2, 168, fmt(d.meters)+' m', 42, S.text, {fontStyle:'bold', fontFamily:F.mono}).setOrigin(0.5);
    if (d.diffLabel) T(this, W/2, 196, d.diffLabel+' SHIFT', 12, S.muted, {fontFamily:F.mono}).setOrigin(0.5);

    const rows = [];
    rows.push(['Coins earned', '+'+fmt(d.total)+'   (checkpoints '+d.coinsGates+' · pickups '+d.coinsPickups+' · distance '+d.distCoins+')']);
    rows.push(['Questions', d.qc+' correct of '+d.qa + (d.bestStreak>1 ? '   ·   best streak ×'+d.bestStreak : '')]);
    if (d.masteredRun > 0) rows.push(['Mastered this shift', '★ '+d.masteredRun]);
    const xpTotal = d.xpAns + d.xpMast + d.xpDist + d.xpBest + d.qa*BAL.xpGate;
    const xpParts = [];
    if (d.xpAns+d.qa*BAL.xpGate>0) xpParts.push('answers +'+(d.xpAns+d.qa*BAL.xpGate));
    if (d.xpMast>0) xpParts.push('mastery +'+d.xpMast);
    if (d.xpDist>0) xpParts.push('distance +'+d.xpDist);
    if (d.xpBest>0) xpParts.push('site best +'+d.xpBest);
    rows.push(['XP gained', '+'+xpTotal+ (xpParts.length ? '   ('+xpParts.join(' · ')+')' : '')]);
    rows.forEach(([k,v],i)=>{
      T(this, 250, 212+i*36, k, 14, S.muted);
      T(this, 250, 230+i*36, v, 14, S.text, {fontFamily:F.mono});
    });

    /* level bar */
    const lv = Profile.level(), p = Profile.data;
    const cur = xpTotalFor(lv), next = xpTotalFor(lv+1);
    const pct = clamp((p.xp-cur)/(next-cur), 0, 1);
    const by = 212 + rows.length*36 + 14;
    T(this, 250, by, 'LV '+lv+' · '+Profile.rank() + (d.lvAfter>d.lvBefore ? '   — LEVEL UP' : ''), 15, S.violet, {fontStyle:'bold'});
    const bg = this.add.graphics();
    bg.fillStyle(C.line,1); bg.fillRoundedRect(250, by+26, 460, 12, 6);
    const fill = this.add.graphics();
    const anim = {v:0};
    this.tweens.add({targets:anim, v:pct, duration:REDUCED?0:800, ease:'Cubic.out', onUpdate:()=>{
      fill.clear(); fill.fillStyle(C.violet,1); fill.fillRoundedRect(250, by+26, Math.max(10,460*anim.v), 12, 6);
    }});
    T(this, 710, by, fmt(next-p.xp)+' xp to LV '+(lv+1), 12, S.muted, {fontFamily:F.mono}).setOrigin(1,0);

    makeBtn(this, W/2-118, 462, 210, 48, 'RUN AGAIN', ()=>this.scene.start('Play', {}), {kind:'primary', size:17});
    makeBtn(this, W/2+118, 462, 210, 48, 'MENU', ()=>this.scene.start('Menu'), {size:16});
    this.input.keyboard.on('keydown-SPACE', ()=>this.scene.start('Play', {}));
    this.input.keyboard.on('keydown-ENTER', ()=>this.scene.start('Play', {}));
  }
}

/* ---- boot the game ---- */
const game = new Phaser.Game({
  type: Phaser.AUTO,
  parent: 'game',
  width: W*2, height: H*2,   // rendered at 2x and zoomed — crisp on large/high-DPI displays
  backgroundColor: '#0D1526',
  render: {
    antialias: true,
    roundPixels: true,               // snap draws to device pixels — no subpixel smearing on moving objects
    powerPreference: 'high-performance',
    desynchronized: true             // lower-latency canvas presentation where supported
  },
  fps: { min: 20, smoothStep: true },// uncapped rAF — runs at the monitor's full refresh rate (60/120/144 Hz)
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: [BootScene, MenuScene, PlayScene, OverScene]
});

/* testing hook */
window.__dbg = { game, BAL, RANKS, VEHICLES, OBS, C, Profile, Bank, SAMPLE_QUESTIONS, qKey, parseQuestionFile, validateRows, nextQuestion, makeSession, levelFromXP, xpTotalFor, Store };
</script>
